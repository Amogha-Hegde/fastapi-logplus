[fastapi-logplus]
log_level = INFO
console_style = json
include_request_id = true
include_uvicorn_logs = true
enable_file_logging = true
base_dir = .
log_file_name = app.json.log
file_style = json
log_when = W0
log_backup = 100
log_timezone = UTC
app_loggers =
    main

[logger_levels]
uvicorn.access = WARNING
uvicorn.error = INFO
main = DEBUG

[json_fields]
timestamp = timestamp
level = levelname
logger = name
message = message
event = event
method = method
path = path
status_code = status_code
request_id = request_id
trace_id = trace_id
tenant = tenant
user_id = user_id
duration_ms = duration_ms

[json_field_defaults]
tenant = -
user_id = null

[text_field_defaults]
tenant = -
user_id = null
